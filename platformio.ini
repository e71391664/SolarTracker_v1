; PlatformIO Project Configuration File
; 
; Проект: SolarTracker
; Плата: Seeed XIAO ESP32C3
; Фреймворк: Arduino
;
; Документация: https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = seeed_xiao_esp32c3
src_dir = src
include_dir = include
lib_dir = lib
test_dir = test

; ============================================================================
; Окружение: Seeed XIAO ESP32C3
; ============================================================================
[env:seeed_xiao_esp32c3]
; Платформа и плата
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
board_build.mcu = esp32c3

; Скорость загрузки (в бодах)
upload_speed = 921600
monitor_speed = 115200

; Опции компилятора
build_flags = 
	-Wall
	-Wextra
	-std=gnu++17
	-D__SKETCH_NAME__=\"SolarTracker\"
	-O2

; Оптимизация

; Тип вывода монитора
monitor_raw = False

; Библиотеки по умолчанию
lib_ldf_mode = chain+

; ============================================================================
; Зависимости (внешние библиотеки)
; ============================================================================
lib_deps = 
	adafruit/Adafruit GFX Library@^1.11.0
	adafruit/Adafruit SSD1306@^2.5.0
	wollewald/INA226_WE@^1.2.0
	Wire

; Дополнительные опции
extra_scripts = 

; Переменные окружения
custom_name = SolarTracker
custom_version = 0.1.0
